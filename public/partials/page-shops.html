<!-- ══════════════════════════════════════
     🏪 SHOPS PAGE — Browse + Register
══════════════════════════════════════ -->
<div class="page" id="page-shops">
  <div class="shops-page-wrap">

    <!-- ── Page Header ── -->
    <div class="section-header" style="margin-bottom:0">
      <p class="section-title"><span class="st-icon">🏪</span> Shop Directory</p>
    </div>

    <!-- ── Search & Filter Toolbar ── -->
    <div class="shops-toolbar">
      <div class="shops-search-wrap">
        <span class="shops-search-icon">🔍</span>
        <input type="text" id="shopsBrowseSearch"
               placeholder="Search shops, owners, locations…"
               oninput="filterBrowseShops()" />
      </div>
      <select class="shops-filter-select" id="shopsBrowseCategory" onchange="filterBrowseShops()">
        <option value="">All Categories</option>
        <option value="General Shop">🛍️ General Shop</option>
        <option value="CSC Center">🏛️ CSC Center</option>
        <option value="Government Service">🏢 Government Service</option>
        <option value="Medical">💊 Medical</option>
        <option value="Education">📚 Education</option>
        <option value="Agriculture">🌾 Agriculture</option>
        <option value="Finance">💰 Finance</option>
        <option value="Other">📦 Other</option>
      </select>
      <select class="shops-filter-select" id="shopsBrowseDistrict" onchange="filterBrowseShops()">
        <option value="">All Districts</option>
      </select>
      <select class="shops-filter-select" id="shopsBrowseSort" onchange="filterBrowseShops()">
        <option value="newest">Newest First</option>
        <option value="rating">Top Rated</option>
        <option value="name">A → Z</option>
      </select>
      <span class="shops-count-badge" id="shopsBrowseCount">0 shops</span>
    </div>

    <!-- ── Browse Grid ── -->
    <div class="shops-browse-grid" id="shopsBrowseGrid">
      <!-- Cards rendered by JS -->
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════
     ✏️ EDIT SHOP MODAL
══════════════════════════════════════ -->
<div class="edit-modal-overlay hidden" id="editShopOverlay" onclick="if(event.target===this)closeEditShop()">
  <div class="edit-modal">
    <div class="edit-modal-header">
      <h3>✏️ Edit Shop Details</h3>
      <button class="edit-modal-close" onclick="closeEditShop()">✕</button>
    </div>
    <div class="edit-modal-body">
      <input type="hidden" id="editShopId"/>
      <div class="edit-field-row">
        <div class="edit-field">
          <label class="edit-label">Shop Name <span style="color:var(--secondary)">*</span></label>
          <input class="edit-input" id="editShopName" type="text" placeholder="Shop Name"/>
        </div>
        <div class="edit-field">
          <label class="edit-label">Owner Name <span style="color:var(--secondary)">*</span></label>
          <input class="edit-input" id="editOwnerName" type="text" placeholder="Owner Name"/>
        </div>
      </div>
      <div class="edit-field">
        <label class="edit-label">Category</label>
        <select class="edit-select" id="editShopType">
          <option value="General Shop">🛍️ General Shop</option>
          <option value="CSC Center">🏛️ CSC Center</option>
          <option value="Government Service">🏢 Government Service</option>
          <option value="Medical">💊 Medical / Pharmacy</option>
          <option value="Education">📚 Education / Coaching</option>
          <option value="Agriculture">🌾 Agriculture / Seeds</option>
          <option value="Finance">💰 Finance / Banking</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="edit-field-row">
        <div class="edit-field">
          <label class="edit-label">Phone 1 <span style="color:var(--secondary)">*</span></label>
          <input class="edit-input" id="editPhone1" type="tel" placeholder="Phone Number"/>
        </div>
        <div class="edit-field">
          <label class="edit-label">Phone 2</label>
          <input class="edit-input" id="editPhone2" type="tel" placeholder="Optional"/>
        </div>
      </div>
      <div class="edit-field">
        <label class="edit-label">Email</label>
        <input class="edit-input" id="editEmail" type="email" placeholder="email@example.com"/>
      </div>
      <div class="edit-field-row">
        <div class="edit-field">
          <label class="edit-label">District</label>
          <input class="edit-input" id="editDistrict" type="text" placeholder="District"/>
        </div>
        <div class="edit-field">
          <label class="edit-label">Village / City</label>
          <input class="edit-input" id="editVillage" type="text" placeholder="Village / City"/>
        </div>
      </div>
      <div class="edit-field">
        <label class="edit-label">Full Address</label>
        <textarea class="edit-textarea" id="editAddress" placeholder="Full address…"></textarea>
      </div>
      <div class="edit-field">
        <label class="edit-label">Description</label>
        <textarea class="edit-textarea" id="editDescription" placeholder="Brief description of your shop and services…"></textarea>
      </div>
    </div>
    <div class="edit-footer">
      <button class="edit-cancel-btn" onclick="closeEditShop()">Cancel</button>
      <button class="edit-save-btn" id="editSaveBtn" onclick="saveEditedShop()">💾 Save Changes</button>
    </div>
  </div>
</div>
</main>
